<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');

  @keyframes float { 0%,100%{transform:translateY(0px) rotate(0deg)} 50%{transform:translateY(-12px) rotate(3deg)} }
  @keyframes box-float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-8px)} }
  @keyframes heartbeat { 
    0%, 100% { transform: scale(1); } 
    15% { transform: scale(1.3); } 
    30% { transform: scale(1); } 
    45% { transform: scale(1.3); } 
    60% { transform: scale(1); } 
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { 0%{opacity:0;transform:scale(0.5)} 70%{transform:scale(1.1)} 100%{opacity:1;transform:scale(1)} }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0) rotate(0deg)} 50%{opacity:1;transform:scale(1.2) rotate(180deg)} }
  @keyframes petal-fall { 
    0% { transform: translateY(-50px) translateX(0px) rotate(0deg); opacity: 0; } 
    10% { opacity: 1; }
    50% { transform: translateY(50vh) translateX(60px) rotate(180deg); } 
    90% { opacity: 1; }
    100% { transform: translateY(100vh) translateX(-60px) rotate(360deg); opacity: 0; } 
  }
  @keyframes pulse-ring { 0%{transform:scale(0.8);opacity:1; border-width: 3px;} 100%{transform:scale(3);opacity:0; border-width: 0px;} }
  @keyframes bg-pan { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  @keyframes yes-pulse { 0% { box-shadow: 0 0 0 0 rgba(233, 30, 99, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(233, 30, 99, 0); } 100% { box-shadow: 0 0 0 0 rgba(233, 30, 99, 0); } }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, html { 
    font-family: 'Outfit', sans-serif; 
    overflow: hidden;
  }

  #wrap {
    min-height: 100vh;
    background: linear-gradient(-45deg, #fff0f5, #fce4ec, #fef3e2, #ffebf0);
    background-size: 400% 400%;
    animation: bg-pan 15s ease infinite;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem 1rem; position: relative;
    text-align: center;
  }

  .petal {
    position: absolute; font-size: 20px; pointer-events: none;
    animation: petal-fall linear infinite;
    z-index: 1;
    filter: drop-shadow(0 4px 6px rgba(233,30,99,0.3));
  }

  .sparkle {
    position: absolute; font-size: 16px; pointer-events: none;
    animation: sparkle ease-in-out infinite;
    z-index: 1;
  }

  #heart-big {
    font-size: 90px;
    animation: heartbeat 2s cubic-bezier(0.25, 1, 0.5, 1) infinite;
    margin-bottom: 0.5rem;
    display: block;
    filter: drop-shadow(0 10px 20px rgba(233,30,99,0.4));
    z-index: 2;
  }

  #title {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 600;
    color: #c2185b;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    margin-bottom: 0.25rem;
    letter-spacing: -0.5px;
    z-index: 2;
  }

  #subtitle {
    font-size: clamp(16px, 3vw, 20px);
    font-weight: 300;
    color: #e91e63;
    animation: fadeIn 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) both;
    animation-delay: 0.3s;
    margin-bottom: 2.5rem;
    opacity: 0.9;
    z-index: 2;
  }

  #proposal-box {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 2.5rem 3rem;
    max-width: 460px; width: 100%;
    animation: fadeIn 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) both, box-float 5s ease-in-out infinite;
    animation-delay: 0.6s, 2s;
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-shadow: 0 20px 50px rgba(233,30,99,0.15), inset 0 0 0 1px rgba(255,255,255,0.5);
    position: relative;
    z-index: 10;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
  }

  #proposal-box:hover {
    box-shadow: 0 25px 60px rgba(233,30,99,0.2), inset 0 0 0 1px rgba(255,255,255,0.7);
    transform: translateY(-5px);
  }

  #ring-wrap {
    position: relative; display: inline-block; margin-bottom: 1.5rem;
  }
  
  #ring {
    font-size: 56px; display: block;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
  }
  
  .ring-pulse {
    position: absolute; top: 50%; left: 50%;
    width: 70px; height: 70px;
    margin: -35px 0 0 -35px;
    border: 3px solid #e91e63;
    border-radius: 50%;
    animation: pulse-ring 2.5s cubic-bezier(0.25, 1, 0.5, 1) infinite;
  }

  #question {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 600;
    color: #880e4f;
    margin-bottom: 0.5rem;
  }

  #tagline {
    font-size: 16px; font-weight: 400; color: #c2185b; opacity: 0.8;
    margin-bottom: 2rem;
  }

  .btn-row {
    display: flex; gap: 20px; justify-content: center;
    flex-wrap: wrap;
  }

  #yes-btn {
    background: linear-gradient(135deg, #e91e63, #c2185b);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 45px;
    font-size: 20px; font-weight: 600;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family: 'Outfit', sans-serif;
    animation: yes-pulse 2s infinite;
    box-shadow: 0 8px 20px rgba(233, 30, 99, 0.3);
    z-index: 100;
    position: relative;
    overflow: hidden;
  }
  
  #yes-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(30deg);
    transition: all 0.8s;
    opacity: 0;
  }

  #yes-btn:hover { 
    transform: scale(1.1) translateY(-3px); 
    box-shadow: 0 15px 30px rgba(233, 30, 99, 0.5); 
    animation: none;
  }
  
  #yes-btn:hover::after {
    left: 100%;
    opacity: 1;
    transition: all 0.8s ease-in-out;
  }

  #yes-btn:active {
    transform: scale(0.95);
  }

  #no-btn {
    background: rgba(255, 255, 255, 0.8);
    color: #e91e63;
    border: 2px solid #f48fb1;
    border-radius: 50px;
    padding: 16px 45px;
    font-size: 20px; font-weight: 500;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    z-index: 99;
  }
  #no-btn:hover { 
    background: #fff;
    border-color: #e91e63;
    box-shadow: 0 8px 20px rgba(233, 30, 99, 0.15);
  }

  #result-msg {
    display: none;
    animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    padding: 1.5rem 0 0;
  }
  #result-msg .big { font-size: 56px; animation: float 3s ease-in-out infinite; display: inline-block; margin-bottom: 10px; }
  #result-msg p { font-size: 24px; font-weight: 600; color: #880e4f; margin-top: 0.5rem; }
  #result-msg small { font-size: 16px; color: #c2185b; opacity: 0.8; display: block; margin-top: 5px; }
</style>
</head>
<body>
<div id="wrap">

  <div class="petal" style="left:8%;animation-duration:6s;animation-delay:0s;">🌸</div>
  <div class="petal" style="left:22%;animation-duration:7s;animation-delay:1s;">🌺</div>
  <div class="petal" style="left:40%;animation-duration:5.5s;animation-delay:0.5s;">🌸</div>
  <div class="petal" style="left:60%;animation-duration:6.5s;animation-delay:1.5s;">🌹</div>
  <div class="petal" style="left:78%;animation-duration:6s;animation-delay:0.3s;">🌸</div>
  <div class="petal" style="left:90%;animation-duration:7s;animation-delay:2s;">🌺</div>

  <div class="sparkle" style="top:15%;left:10%;animation-duration:3s;animation-delay:0s;">✨</div>
  <div class="sparkle" style="top:20%;right:12%;animation-duration:3.5s;animation-delay:0.7s;">⭐</div>
  <div class="sparkle" style="top:60%;left:5%;animation-duration:4s;animation-delay:1s;">✨</div>
  <div class="sparkle" style="top:70%;right:8%;animation-duration:3s;animation-delay:0.4s;">💫</div>

  <span id="heart-big">❤️</span>
  <h1 id="title">I Love You</h1>
  <p id="subtitle">Every moment with you is magic ✨</p>

  <div id="proposal-box">
    <div id="ring-wrap">
      <span id="ring">💍</span>
      <div class="ring-pulse"></div>
    </div>
    <h2 id="question">Will you marry me?</h2>
    <p id="tagline">You make my heart skip a beat...</p>

    <div class="btn-row">
      <button id="yes-btn" onclick="sayYes()">Yes! 💕</button>
      <button id="no-btn" onclick="handleNo(this, event)">No</button>
    </div>

    <div id="result-msg">
      <div class="big" id="result-icon">🎉</div>
      <p id="result-text">You made me the happiest!</p>
      <small id="result-sub">Forever & always 💕</small>
    </div>
  </div>
</div>

<script>
  let noCount = 0;

  function handleNo(btn, event) {
    if (event) event.preventDefault();
    
    noCount++;
    
    if (noCount >= 100) {
      sayNo();
      return;
    }

    const box = document.getElementById('proposal-box');
    
    // Freeze the box dimensions so it doesn't shrink when button becomes absolute
    if (!box.dataset.frozen) {
      box.style.minWidth = box.offsetWidth + 'px';
      box.style.minHeight = box.offsetHeight + 'px';
      box.dataset.frozen = 'true';
      // Make it absolute immediately so we can measure the final position of Yes button
      btn.style.position = 'absolute';
    }

    const boxW = box.offsetWidth;
    const boxH = box.offsetHeight;
    const bw = btn.offsetWidth;
    const bh = btn.offsetHeight;
    
    const yesBtn = document.getElementById('yes-btn');
    const boxRect = box.getBoundingClientRect();
    const yesRect = yesBtn.getBoundingClientRect();
    
    // Relative coordinates of Yes button with extra padding to keep clear
    const yesLeft = yesRect.left - boxRect.left - 15;
    const yesTop = yesRect.top - boxRect.top - 15;
    const yesRight = yesRect.right - boxRect.left + 15;
    const yesBottom = yesRect.bottom - boxRect.top + 15;
    
    // Calculate random position restricted within the box bounds
    const maxX = boxW - bw - 20;
    const maxY = boxH - bh - 20;
    let rx, ry;
    let overlap = true;
    let attempts = 0;
    
    while (overlap && attempts < 50) {
      rx = Math.max(20, Math.floor(Math.random() * maxX));
      ry = Math.max(20, Math.floor(Math.random() * maxY));
      
      // Check if this position overlaps with Yes button
      overlap = (rx < yesRight && (rx + bw) > yesLeft && ry < yesBottom && (ry + bh) > yesTop);
      attempts++;
    }
    
    // Smooth, springy transition when running away
    btn.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
    btn.style.position = 'absolute';
    btn.style.left = rx + 'px';
    btn.style.top = ry + 'px';
    btn.style.zIndex = '999';
    
    // Fun messages as they keep clicking
    const messages = [
      "Please no!", "Are you sure? 🥺", "Think again...", "Don't do this! 😭",
      "Why are you doing this?", "Just say YES! 💕", "You can't catch me! 🏃‍♂️",
      "Still trying? 😜", "You're very persistent!", "Is this a game to you? 🎮",
      "Give up already!", "Error 404: No not found 🚫", "I'm getting tired...",
      "Have mercy! 🙏", "Yes is the only way ✨", "My thumb hurts...",
      "Are your fingers okay?", "Almost there? Nope.", "I admire your dedication.",
      "Seriously? 😒", "Okay, stop it.", "You're breaking my heart 💔",
      "Just click YES...", "I won't let you!", "I am speed ⚡", "Missed me!",
      "Too slow!", "Nice try!", "Catch me if you can!", "You're making me dizzy 😵",
      "I can do this all day", "Please just stop 😭", "You win... kidding! 😂",
      "100 clicks is a long way!", "Halfway there yet?", "I forgot the count",
      "What are we doing?", "Okay, last chance to say Yes", "You're stubborn!",
      "I love your persistence ❤️", "But I really want a Yes 🥺", "Fine, keep clicking...",
      "I have infinite energy", "You're wearing out your screen", "Is your phone okay?",
      "I'm invincible! 🛡️", "Just 1 more... haha no", "Getting bored? Say Yes!",
      "I'll never surrender!", "You can't defeat me!", "I am inevitable 🫰",
      "Still here?", "Why not just Yes?", "My legs are sore", "Tap tap tap...",
      "Are we there yet?", "I'm running out of quotes", "Just marry me already!",
      "You're too fast!", "Nope!", "Try a little to the left", "Ouch! Just kidding",
      "I'm a ninja 🥷", "You missed!", "So close...", "I believe in you!",
      "Just 100 taps...", "Keep going!", "Don't give up!", "Yes button is lonely 🥺",
      "Click the pink one!", "I'm white, click pink!", "You know you want to say Yes",
      "Okay, I'm out of breath", "Just kidding, I'm a button", "Tired?",
      "Your thumb must be strong", "A true warrior!", "Will you say yes now?",
      "No means Yes?", "Okay, maybe?", "Definitely YES!"
    ];
    
    if (noCount === 99) {
      btn.textContent = '1 more... 😭';
    } else {
      btn.textContent = messages[(noCount - 1) % messages.length];
    }
    
    if (noCount > 2) {
      btn.style.transform = `scale(${Math.max(0.65, 1 - noCount/250)})`;
    }
  }

  function sayYes() {
    const btnRow = document.querySelector('.btn-row');
    btnRow.style.transition = 'opacity 0.4s ease';
    btnRow.style.opacity = '0';
    setTimeout(() => { btnRow.style.display = 'none'; }, 400);
    
    document.getElementById('ring').textContent = '👑';
    document.getElementById('question').textContent = 'You said Yes! 💍';
    document.getElementById('tagline').textContent = 'My heart is yours forever...';
    
    const rm = document.getElementById('result-msg');
    setTimeout(() => {
      rm.style.display = 'block';
    }, 400);
    
    document.getElementById('result-icon').textContent = '🥂🎊💕';
    document.getElementById('result-text').textContent = 'You made me the happiest person alive!';
    document.getElementById('result-sub').textContent = 'Forever & always, together ❤️';
    launchConfetti();
  }

  function sayNo() {
    document.getElementById('question').textContent = 'Are you sure? 🥺';
    document.getElementById('tagline').textContent = 'My heart is breaking...';
    document.getElementById('heart-big').textContent = '💔';
  }

  function launchConfetti() {
    const emojis = ['🎊','🎉','💕','❤️','💍','✨','🌸'];
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.style.cssText = `position:fixed;font-size:${20+Math.random()*25}px;pointer-events:none;z-index:9999;
          left:${Math.random()*100}%;top:-50px;
          animation:petal-fall ${3+Math.random()*4}s cubic-bezier(0.37, 0, 0.63, 1) forwards;
          filter: drop-shadow(0 5px 10px rgba(0,0,0,0.15));`;
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 7000);
      }, i * 80);
    }
  }
</script>
</body>
</html>
